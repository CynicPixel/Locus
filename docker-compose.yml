services:
  go-ingestor:
    build: ./go-ingestor
    restart: unless-stopped
    network_mode: host
    env_file: ./go-ingestor/.env
    volumes:
      - socket-vol:/tmp/locus
      - ./go-ingestor/.env:/app/buyer.env:ro
      - ./go-ingestor/location-override.json:/app/location-override.json:ro
    command:
      - "--port=61339"
      - "--mode=peer"
      - "--buyer-or-seller=buyer"
      - "--list-of-sellers-source=env"
      - "--envFile=/app/buyer.env"
      - "--my-public-ip=${MY_PUBLIC_IP}"
      - "--my-public-port=${MY_PUBLIC_PORT}"

  ml-service:
    build: ./ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  rust-backend:
    build: ./rust-backend
    restart: unless-stopped
    depends_on:
      go-ingestor:
        condition: service_started
      ml-service:
        condition: service_healthy
    command:
      - "--ws-addr=0.0.0.0:9001"
      - "--ml-service-url=http://ml-service:8000"
    volumes:
      - socket-vol:/tmp/locus
    ports:
      - "9001:9001"
    networks:
      - internal
      - external

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - external

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  socket-vol:
