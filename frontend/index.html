<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Locus MLAT — Aircraft Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: "Segoe UI", system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }
  #layout { display: flex; height: 100vh; }
  #map { flex: 1; position: relative; }
  #sidebar {
    width: 340px; min-width: 260px; display: flex; flex-direction: column;
    background: #161b22; border-left: 1px solid #30363d; overflow: hidden;
  }
  #sidebar header {
    padding: 12px 16px; background: #1c2128; border-bottom: 1px solid #30363d;
    font-size: 1rem; font-weight: 600; letter-spacing: .03em;
  }
  #sidebar header span.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
  .panel { border-bottom: 1px solid #30363d; padding: 10px 14px; }
  .panel-title { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #8b949e; margin-bottom: 6px; }
  #aircraft-list { overflow-y: auto; flex: 1; min-height: 0; }
  .ac-row {
    padding: 7px 14px; border-bottom: 1px solid #21262d; cursor: pointer;
    display: flex; align-items: center; gap: 8px; font-size: .82rem;
  }
  .ac-row:hover { background: #1c2128; }
  .ac-icao { font-weight: 700; font-family: monospace; min-width: 60px; }
  .ac-pos { color: #8b949e; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge {
    font-size: .68rem; padding: 2px 6px; border-radius: 10px; font-weight: 700; white-space: nowrap;
  }
  .badge-normal  { background: #1a7f37; color: #fff; }
  .badge-anomaly { background: #b91c1c; color: #fff; }
  .badge-unknown { background: #374151; color: #9ca3af; }
  .badge-idle    { background: #7f1d1d; color: #fca5a5; }
  #alert-list { max-height: 120px; overflow-y: auto; }
  .alert-entry { font-size: .75rem; padding: 3px 0; border-bottom: 1px solid #21262d; color: #f59e0b; }
  #health-chart-wrap { padding: 10px 14px 14px; flex-shrink: 0; }
  #health-chart-wrap canvas { max-height: 110px;}
  #status-bar {
    padding: 5px 14px; font-size: .72rem; color: #8b949e;
    border-top: 1px solid #30363d; display: flex; justify-content: space-between;
    flex-shrink: 0;
  }
  /* Sensor toggle button */
  #sensor-toggle {
    position: absolute; top: 80px; right: 10px; z-index: 1000;
    background: #161b22; color: #c9d1d9; border: 1px solid #30363d;
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: .8rem;
  }
  #sensor-toggle.active { background: #1a7f37; border-color: #22c55e; color: #fff; }
  /* GDOP heatmap toggle button */
  #gdop-toggle {
    position: absolute; top: 120px; right: 10px; z-index: 1000;
    background: #161b22; color: #c9d1d9; border: 1px solid #30363d;
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: .8rem;
  }
  #gdop-toggle.active { background: #7c3aed; border-color: #a78bfa; color: #fff; }
  /* Aircraft popup panel */
  #ac-popup {
    display: none; position: absolute; bottom: 36px; left: 10px; z-index: 1000;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 12px 14px; min-width: 260px; max-width: 320px; font-size: .82rem;
  }
  #ac-popup .popup-title { font-weight: 700; font-family: monospace; font-size: .95rem; margin-bottom: 8px; display: flex; justify-content: space-between; }
  #ac-popup table { width: 100%; border-collapse: collapse; }
  #ac-popup td { padding: 2px 4px; color: #8b949e; }
  #ac-popup td:last-child { color: #c9d1d9; text-align: right; }
  #ac-popup .idle-strip { margin-top: 8px; background: #7f1d1d; color: #fca5a5; border-radius: 4px; padding: 4px 8px; font-size: .75rem; display: none; }
  /* Stability alerts panel */
  .alert-critical { color: #ef4444; font-weight: 600; }
  .alert-warning { color: #f59e0b; }
  .alert-info { color: #3b82f6; }
  #stability-alerts {
    max-height: 150px; overflow-y: auto; font-size: .72rem;
    padding: 8px 14px; background: #0d1117; border-bottom: 1px solid #30363d;
  }
  .stability-alert-entry {
    padding: 4px 0; border-bottom: 1px solid #21262d;
    display: flex; align-items: center; gap: 6px;
  }
  .stability-alert-entry:last-child { border-bottom: none; }
  .alert-time { color: #6e7681; min-width: 60px; }
</style>
</head>
<body>
<div id="layout">
  <div id="map">
    <button id="sensor-toggle" onclick="toggleSensors()">&#128225; Sensors</button>
    <button id="gdop-toggle" onclick="toggleGdopHeatmap()">&#127758; GDOP</button>
    <div id="ac-popup">
      <div class="popup-title">
        <span id="popup-icao">—</span>
        <span style="cursor:pointer;color:#8b949e" onclick="closePopup()">&#x2715;</span>
      </div>
      <div class="idle-strip" id="popup-idle">&#9888; No signal for <span id="popup-idle-time"></span></div>
      <table id="popup-table"></table>
    </div>
  </div>
  <div id="sidebar">
    <header>
      <span class="dot" id="conn-dot" style="background:#8b949e"></span>
      Locus MLAT
    </header>

    <div class="panel">
      <div class="panel-title">Alerts</div>
      <div id="alert-list"><em style="color:#555;font-size:.75rem">No alerts</em></div>
    </div>

    <div id="stability-alerts" style="display:none;">
      <div class="panel-title">Clock Stability</div>
      <div id="stability-alert-list"></div>
    </div>

    <div class="panel-title" style="padding:8px 14px 0">Aircraft (<span id="ac-count">0</span>)</div>
    <div id="aircraft-list"></div>

    <div class="panel" id="health-chart-wrap">
      <div class="panel-title">Sensor Health (clock offset ns)</div>
      <canvas id="health-chart"></canvas>
    </div>

    <div class="panel" id="coverage-stats" style="display:none;">
      <!-- GDOP coverage statistics populated by updateCoverageStats() -->
    </div>

    <div id="status-bar">
      <span id="stat-count">0 aircraft</span>
      <span id="stat-time">—</span>
    </div>
  </div>
</div>

<script>
// ─── Map setup ───────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true, preferCanvas: true })
  .setView([50.1, -5.8], 6);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 19,
}).addTo(map);

// 300 km region of interest around Cornwall sensors
L.circle([50.1, -5.8], {
  radius: 300000,
  color: '#facc15', fillColor: '#facc15',
  fillOpacity: 0.04, weight: 1.5, dashArray: '6 4'
}).addTo(map).bindTooltip('300 km sensor coverage (Cornwall)', { permanent: false });

// ─── State ───────────────────────────────────────────────────────────────────
const aircraft = {};          // icao24 → { marker, ellipse, state, lastSeen, idle, trail[] }
const IDLE_WARNING_MS = 60_000;   // show red triangle after 60 s idle
const REMOVE_MS       = 300_000;  // hard-remove after 5 min
let sensorsVisible    = false;
const sensorMarkers   = {};       // sensor_id → L.marker
const sensorData      = {};       // sensor_id → { lat, lon, alt_m, offsets[] }
let selectedIcao      = null;
let attributionLines  = [];       // active L.polyline[] for sensor highlight

// Topology visualization
const topologyLayer = L.layerGroup();
let topologyVisible = false;
const sensorNodes = {};           // sensor_id → L.circleMarker
const topologyEdges = [];         // Array of L.polyline
let stabilityAlerts = [];         // Ring buffer of alerts (max 10)
const MAX_STABILITY_ALERTS = 10;

// GDOP heatmap visualization
const gdopLayer = L.layerGroup();
let gdopVisible = false;
let gdopStats = null;             // Latest coverage statistics

const MAX_TRAIL_POINTS = 300;
const MAX_TRAIL_AGE_MS = 10 * 60 * 1000;  // 10 minutes
let trailPolylines = [];  // active L.polyline[] for the selected trail

function markerColor(state) {
  if (state.anomaly_label === "anomalous") return "#ef4444";
  if (state.spoof_flag)          return "#f59e0b";
  return "#22c55e";
}

function makeIcon(color) {
  return L.divIcon({
    className: "",
    html: `<svg width="14" height="14" viewBox="0 0 14 14">
             <circle cx="7" cy="7" r="5" fill="${color}" stroke="#000" stroke-width="1.5"/>
           </svg>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

function makeIdleIcon(color) {
  return L.divIcon({
    className: "",
    html: `<svg width="22" height="22" viewBox="0 0 22 22">
             <circle cx="7" cy="15" r="5" fill="${color}" stroke="#000" stroke-width="1.5" opacity="0.5"/>
             <polygon points="15,4 8,18 22,18" fill="none" stroke="#ef4444" stroke-width="1.8"/>
             <text x="15" y="17" font-size="8" fill="#ef4444" text-anchor="middle">!</text>
           </svg>`,
    iconSize: [22, 22], iconAnchor: [7, 15],
  });
}

function makeSensorIcon() {
  return L.divIcon({
    className: "",
    html: `<svg width="20" height="24" viewBox="0 0 20 24">
             <rect x="9" y="12" width="2" height="10" fill="#60a5fa"/>
             <polygon points="10,2 4,13 16,13" fill="#60a5fa" stroke="#1e3a5f" stroke-width="1"/>
           </svg>`,
    iconSize: [20, 24], iconAnchor: [10, 22],
  });
}

// ─── Trail functions ──────────────────────────────────────────────────────────
function pushTrailPoint(icao24, state) {
  const ac = aircraft[icao24];
  if (!ac) return;
  if (!ac.trail) ac.trail = [];

  const point = {
    lat: state.lat, lon: state.lon, alt_m: state.alt_m,
    gdop: state.gdop, anomaly_label: state.anomaly_label,
    anomaly_confidence: state.anomaly_confidence,
    spoof_flag: state.spoof_flag, ts: Date.now()
  };

  // Skip stationary noise (~1m gate in degree space)
  if (ac.trail.length > 0) {
    const last = ac.trail[ac.trail.length - 1];
    const dlat = point.lat - last.lat, dlon = point.lon - last.lon;
    if (dlat * dlat + dlon * dlon < 1e-10) return;
  }

  ac.trail.push(point);
  while (ac.trail.length > MAX_TRAIL_POINTS) ac.trail.shift();
  const cutoff = Date.now() - MAX_TRAIL_AGE_MS;
  while (ac.trail.length > 0 && ac.trail[0].ts < cutoff) ac.trail.shift();
}

function flushTrailSource(icao24) {
  for (const pl of trailPolylines) map.removeLayer(pl);
  trailPolylines = [];

  const ac = aircraft[icao24];
  if (!ac || !ac.trail || ac.trail.length < 2) return;

  const trail = ac.trail;
  const total = trail.length;

  for (let i = 0; i < total - 1; i++) {
    const p0 = trail[i], p1 = trail[i + 1];
    const opacity = 0.1 + (i / (total - 1)) * 0.75;

    let color, dashArray = null;
    if (p1.spoof_flag || (p1.anomaly_label === "anomalous" && p1.anomaly_confidence > 0.75)) {
      color = "#ef4444";
    } else if (p1.gdop > 0) {
      color = "#60a5fa";
    } else {
      color = "#94a3b8";
      dashArray = "4 4";
    }

    trailPolylines.push(
      L.polyline([[p0.lat, p0.lon], [p1.lat, p1.lon]], {
        color, opacity, weight: 1.8, dashArray, interactive: false
      }).addTo(map)
    );
  }
}

function clearTrailSource() {
  for (const pl of trailPolylines) map.removeLayer(pl);
  trailPolylines = [];
}

// ─── Aircraft update ──────────────────────────────────────────────────────────
function updateAircraft(state) {
  const { icao24, lat, lon, alt_m, anomaly_label, spoof_flag } = state;
  if (lat == null || lon == null) return;
  if (Math.abs(lat) > 90 || Math.abs(lon) > 180) return;
  if (lat === 0 && lon === 0) return;

  const color = markerColor(state);
  const pos = [lat, lon];

  if (!aircraft[icao24]) {
    const marker = L.marker(pos, { icon: makeIcon(color) })
      .bindTooltip(icao24, { permanent: false, direction: "top" })
      .addTo(map);
    marker.on("click", () => focusAircraft(icao24));
    const ellipse = L.circle(pos, { radius: Math.max(state.confidence_ellipse_m || 200, 100),
      color, fillColor: color, fillOpacity: 0.08, weight: 1 }).addTo(map);
    aircraft[icao24] = { marker, ellipse, state, lastSeen: Date.now(), idle: false };
    pushTrailPoint(icao24, state);
    if (selectedIcao === icao24) flushTrailSource(icao24);
  } else {
    const ac = aircraft[icao24];
    ac.marker.setLatLng(pos).setIcon(makeIcon(color));
    ac.ellipse.setLatLng(pos)
      .setRadius(Math.max(state.confidence_ellipse_m || 200, 100))
      .setStyle({ color, fillColor: color });
    ac.lastSeen = Date.now();
    ac.state = state;
    // Clear idle state on fresh update
    if (ac.idle) {
      ac.idle = false;
      ac.marker.setIcon(makeIcon(color));
    }
    pushTrailPoint(icao24, state);
    if (selectedIcao === icao24) flushTrailSource(icao24);
  }

  renderList();

  if (anomaly_label === "anomalous" || spoof_flag) addAlert(state);

  // Refresh popup if this is the selected aircraft
  if (selectedIcao === icao24) {
    refreshPopup();
    drawAttributionLines(icao24);
  }
}

function addAlert(state) {
  const el = document.getElementById("alert-list");
  const em = el.querySelector("em");
  if (em) em.remove();
  const row = document.createElement("div");
  row.className = "alert-entry";
  const flag = state.spoof_flag ? "GPS-SPOOF" : "ANOMALY";
  row.textContent = `[${new Date().toLocaleTimeString()}] ${state.icao24} — ${flag}`;
  el.insertBefore(row, el.firstChild);
  if (el.children.length > 40) el.removeChild(el.lastChild);
}

function focusAircraft(icao24) {
  const ac = aircraft[icao24];
  if (ac) {
    map.setView(ac.marker.getLatLng(), Math.max(map.getZoom(), 11));
    openPopup(icao24);
  }
}

function renderList() {
  const list = document.getElementById("aircraft-list");
  const sorted = Object.entries(aircraft)
    .sort((a, b) => b[1].lastSeen - a[1].lastSeen);

  list.innerHTML = "";
  for (const [icao, ac] of sorted) {
    const s = ac.state;
    const row = document.createElement("div");
    row.className = "ac-row";
    row.onclick = () => focusAircraft(icao);

    let badge;
    if (s.anomaly_label === "anomalous") badge = `<span class="badge badge-anomaly">ANOMALY</span>`;
    else if (s.anomaly_label === "normal") badge = `<span class="badge badge-normal">NORMAL</span>`;
    else                            badge = `<span class="badge badge-unknown">—</span>`;

    const spoofBadge = s.spoof_flag
      ? `<span class="badge" style="background:#92400e;color:#fef3c7">SPOOF</span>` : "";

    const idleBadge = ac.idle
      ? `<span class="badge badge-idle">IDLE</span>` : "";

    row.innerHTML = `
      <span class="ac-icao">${icao.toUpperCase()}</span>
      <span class="ac-pos">${s.lat?.toFixed(4)}° ${s.lon?.toFixed(4)}° ${Math.round(s.alt_m ?? 0)}m</span>
      ${badge}${spoofBadge}${idleBadge}`;
    list.appendChild(row);
  }
  document.getElementById("ac-count").textContent = sorted.length;
  document.getElementById("stat-count").textContent = `${sorted.length} aircraft`;
}

// ─── Stale / idle cleanup ────────────────────────────────────────────────────
setInterval(() => {
  const now = Date.now();
  for (const [icao, ac] of Object.entries(aircraft)) {
    const age = now - ac.lastSeen;
    if (age > REMOVE_MS) {
      map.removeLayer(ac.marker);
      map.removeLayer(ac.ellipse);
      if (selectedIcao === icao) {
        clearTrailSource();
        closePopup();
      }
      delete aircraft[icao];
      continue;
    }
    const shouldBeIdle = age > IDLE_WARNING_MS;
    if (shouldBeIdle !== ac.idle) {
      ac.idle = shouldBeIdle;
      const color = markerColor(ac.state);
      ac.marker.setIcon(shouldBeIdle ? makeIdleIcon(color) : makeIcon(color));
    }
  }
  renderList();
  if (selectedIcao && aircraft[selectedIcao]) refreshPopupIdleStrip();
}, 5000);

// ─── Sensor toggle ────────────────────────────────────────────────────────────
function toggleSensors() {
  sensorsVisible = !sensorsVisible;
  document.getElementById("sensor-toggle").classList.toggle("active", sensorsVisible);
  if (sensorsVisible) {
    for (const [id, sd] of Object.entries(sensorData)) {
      if (!sensorMarkers[id]) createSensorMarker(id, sd);
    }
    // Show topology if available
    if (!topologyVisible) {
      topologyLayer.addTo(map);
      topologyVisible = true;
    }
  } else {
    for (const m of Object.values(sensorMarkers)) map.removeLayer(m);
    for (const k of Object.keys(sensorMarkers)) delete sensorMarkers[k];
    // Hide topology
    if (topologyVisible) {
      map.removeLayer(topologyLayer);
      topologyVisible = false;
    }
  }
}

function createSensorMarker(id, sd) {
  // Build offset table rows for pairs that include this sensor
  const offsets = (sd.offsets || []).map(o => {
    const peer = o.sensor_i == id ? o.sensor_j : o.sensor_i;
    const converged = o.is_converged ? "&#10003;" : "&#8987;";
    const ns = o.offset_ns.toFixed(1) + " ns";
    return `<tr><td>${peer}</td><td>${ns}</td><td>${converged}</td></tr>`;
  }).join("");

  const popupHtml = `
    <div style="font-family:monospace;font-size:.8rem;color:#c9d1d9;min-width:180px">
      <b>Sensor ${id}</b><br>
      ${sd.lat?.toFixed(5)}° ${sd.lon?.toFixed(5)}°<br>
      Alt: ${Math.round(sd.alt_m ?? 0)} m<br>
      ${offsets ? `<table style="width:100%;margin-top:4px;border-collapse:collapse">
        <tr><th>Peer</th><th>Offset</th><th></th></tr>${offsets}</table>` : "<em>No clock pairs yet</em>"}
    </div>`;

  const marker = L.marker([sd.lat, sd.lon], { icon: makeSensorIcon() })
    .bindPopup(popupHtml)
    .addTo(map);
  sensorMarkers[id] = marker;
}

// ─── GDOP Heatmap ─────────────────────────────────────────────────────────────
function qualityColor(quality) {
  const colors = {
    excellent: "#22c55e",     // Green
    good: "#84cc16",          // Chartreuse
    moderate: "#eab308",      // Yellow
    poor: "#f97316",          // Orange
    unacceptable: "#ef4444",  // Red
    degenerate: "#18181b"     // Black
  };
  return colors[quality] || "#6b7280";
}

function updateGdopHeatmap(data) {
  console.log("GDOP heatmap message received:", {
    points: data.points?.length,
    resolution: data.resolution_deg,
    altitude: data.altitude_m,
    timestamp: new Date(data.timestamp_ms).toLocaleTimeString()
  });

  gdopLayer.clearLayers();

  if (!data.points || data.points.length === 0) {
    console.warn("GDOP heatmap: no points received");

    // Show "no coverage" message if layer is visible
    if (gdopVisible) {
      const statsPanel = document.getElementById("coverage-stats");
      if (statsPanel) {
        statsPanel.style.display = "block";
        statsPanel.innerHTML = `
          <div class="panel-title">GDOP Coverage</div>
          <div style="font-size:.72rem;color:#f59e0b;padding:10px 0;text-align:center">
            ⚠️ No coverage data<br>
            <span style="font-size:.65rem;color:#6e7681">
              Requires ≥3 active sensors
            </span>
          </div>
        `;
      }
    }
    return;
  }

  // Calculate radius in meters from resolution (degrees to meters at equator)
  const radiusMeters = data.resolution_deg * 111000 / 2;

  console.log(`Rendering GDOP heatmap: ${data.points.length} points, resolution ${data.resolution_deg}°, altitude ${data.altitude_m}m`);

  data.points.forEach(point => {
    const color = qualityColor(point.quality);

    const gdopStr = Number.isFinite(point.gdop)
      ? point.gdop.toFixed(2)
      : "∞";

    const condStr = (point.condition_number != null && Number.isFinite(point.condition_number))
      ? point.condition_number.toFixed(1)
      : "—";

    L.circle([point.lat, point.lon], {
      radius: radiusMeters,
      fillColor: color,
      fillOpacity: 0.4,
      stroke: false,
      interactive: true
    })
    .bindTooltip(
      `<b>GDOP: ${gdopStr}</b><br>` +
      `Quality: ${point.quality}<br>` +
      `Sensors: ${point.num_sensors}<br>` +
      `Condition: ${condStr}`,
      { sticky: true }
    )
    .addTo(gdopLayer);
  });

  // Store statistics
  gdopStats = data.stats;
  updateCoverageStats();

  console.log(`GDOP heatmap stats: mean=${data.stats.mean_gdop.toFixed(2)}, ` +
              `excellent=${data.stats.excellent}, good=${data.stats.good}, ` +
              `moderate=${data.stats.moderate}, poor=${data.stats.poor}`);
  console.log("✅ GDOP heatmap rendered successfully");
}

function toggleGdopHeatmap() {
  gdopVisible = !gdopVisible;
  const btn = document.getElementById("gdop-toggle");
  const statsPanel = document.getElementById("coverage-stats");
  btn.classList.toggle("active", gdopVisible);

  if (gdopVisible) {
    gdopLayer.addTo(map);

    if (gdopStats) {
      // Data already loaded
      if (statsPanel) statsPanel.style.display = "block";
    } else {
      // Show loading message
      if (statsPanel) {
        statsPanel.style.display = "block";
        statsPanel.innerHTML = `
          <div class="panel-title">GDOP Coverage</div>
          <div style="font-size:.72rem;color:#8b949e;padding:10px 0;text-align:center">
            ⏳ Computing heatmap...<br>
            <span style="font-size:.65rem;color:#6e7681">
              Requires ≥3 sensors<br>
              Updates every 60s
            </span>
          </div>
        `;
      }
      console.log("GDOP heatmap: waiting for first data (updates every 60s)");
    }
  } else {
    map.removeLayer(gdopLayer);
    if (statsPanel) statsPanel.style.display = "none";
  }
}

function updateCoverageStats() {
  const panel = document.getElementById("coverage-stats");
  if (!panel || !gdopStats) return;

  const total = gdopStats.total_points;
  if (total === 0) return;

  const pct = (count) => ((count / total) * 100).toFixed(1);

  panel.innerHTML = `
    <div class="panel-title">GDOP Coverage</div>

      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="color:#84cc16">● Good (2.0-5.0)</span>
        <span style="color:#c9d1d9">${pct(gdopStats.good)}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="color:#eab308">● Moderate (5.0-10.0)</span>
        <span style="color:#c9d1d9">${pct(gdopStats.moderate)}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="color:#f97316">● Poor (10.0-20.0)</span>
        <span style="color:#c9d1d9">${pct(gdopStats.poor)}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">

}

// ─── Sensor health chart (time-series) ───────────────────────────────────────
const healthData = { labels: [], datasets: [] };
const MAX_CHART_POINTS = 60; // 60 data points at 5s intervals = 5 minutes

const healthChart = new Chart(document.getElementById("health-chart"), {
  type: "line",
  data: healthData,
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: true,
        position: 'bottom',
        labels: {
          color: "#8b949e",
          font: { size: 9 },
          boxWidth: 12,
          usePointStyle: true
        }
      },
      tooltip: {
        mode: 'index',
        intersect: false,
        callbacks: {
          label: (context) => {
            const sensorId = context.dataset.sensorId;
            const offset = context.parsed.y;
            if (!sensorId) return `${offset.toFixed(1)} ns`;

            const sensor = context.dataset.latestSensor;
            if (!sensor) return `S${sensorId}: ${offset.toFixed(1)} ns`;

            let lines = [
              `S${sensorId}: ${offset.toFixed(1)} ns`,
              `  Drift: ${sensor.drift_ns_per_s.toFixed(3)} ns/s`,
              `  Uncertainty: ±${sensor.uncertainty_ns.toFixed(1)} ns`,
              `  Status: ${sensor.status.toUpperCase()}`
            ];

            if (sensor.allan_deviation) {
              const ad = sensor.allan_deviation;
              lines.push(`  ADEV(60s): ${ad.adev_60s.toFixed(1)} ns`);
            }

            return lines;
          }
        }
      }
    },
    scales: {
      x: {
        display: true,
        title: { display: true, text: 'Time', color: "#8b949e" },
        ticks: {
          color: "#8b949e",
          font: { size: 9 },
          maxRotation: 0,
          autoSkip: true,
          maxTicksLimit: 8
        },
        grid: { display: false }
      },
      y: {
        display: true,
        title: { display: true, text: 'Clock Offset (ns)', color: "#8b949e" },
        ticks: { color: "#8b949e", font: { size: 10 } },
        grid: { color: "#21262d" }
        
      },
    },
  },
});

function updateSensorHealthChart(clockData) {
  if (!clockData || !clockData.sensors) return;

  // Add new timestamp to labels
  const timestamp = new Date().toLocaleTimeString();
  healthData.labels.push(timestamp);
  if (healthData.labels.length > MAX_CHART_POINTS) {
    healthData.labels.shift();
  }

  // Track which sensors we've seen in this update
  const seenSensors = new Set();

  // Update or create dataset for each sensor
  for (const sensor of clockData.sensors) {
    seenSensors.add(sensor.sensor_id);

    // Find existing dataset for this sensor
    let dataset = healthData.datasets.find(ds => ds.sensorId === sensor.sensor_id);

    if (!dataset) {
      // Create new dataset for this sensor
      // Color by status
      let color = "#6e7681"; // Disconnected
      if (sensor.status === "stable") color = "#22c55e";
      else if (sensor.status === "marginal") color = "#f59e0b";
      else if (sensor.status === "unstable") color = "#ef4444";

      // Backfill with nulls for previous time points
      const backfill = new Array(healthData.labels.length - 1).fill(null);

      dataset = {
        label: `S${sensor.sensor_id}`,
        sensorId: sensor.sensor_id,
        data: backfill,
        borderColor: color,
        backgroundColor: color,
        borderWidth: 2,
        pointRadius: 2,
        pointHoverRadius: 4,
        tension: 0.1,
        latestSensor: sensor
      };
      healthData.datasets.push(dataset);
    } else {
      // Update existing dataset
      dataset.latestSensor = sensor;

      // Update color based on current status
      let color = "#6e7681";
      if (sensor.status === "stable") color = "#22c55e";
      else if (sensor.status === "marginal") color = "#f59e0b";
      else if (sensor.status === "unstable") color = "#ef4444";
      dataset.borderColor = color;
      dataset.backgroundColor = color;
    }

    // Add new data point (raw nanoseconds)
    dataset.data.push(sensor.offset_ns);

    // Trim old data points
    if (dataset.data.length > MAX_CHART_POINTS) {
      dataset.data.shift();
    }
  }

  // For sensors not in this update, add null to maintain alignment
  for (const dataset of healthData.datasets) {
    if (!seenSensors.has(dataset.sensorId)) {
      dataset.data.push(null);
      if (dataset.data.length > MAX_CHART_POINTS) {
        dataset.data.shift();
      }
    }
  }

  healthChart.update();
}

function updateSensorHealth(offsets, sensors) {
  // Upsert sensorData from sensors array
  if (sensors) {
    for (const s of sensors) {
      sensorData[s.sensor_id] = { ...sensorData[s.sensor_id], ...s, offsets: [] };
    }
  }
  // Attach offset info to each sensor
  for (const o of offsets) {
    if (sensorData[o.sensor_i]) {
      sensorData[o.sensor_i].offsets = [...(sensorData[o.sensor_i].offsets || []), o];
    }
    if (sensorData[o.sensor_j]) {
      sensorData[o.sensor_j].offsets = [...(sensorData[o.sensor_j].offsets || []), o];
    }
  }

  // Chart update
  const label = new Date().toLocaleTimeString();
  const maxPoints = 30;
  healthData.labels.push(label);
  if (healthData.labels.length > maxPoints) healthData.labels.shift();

  for (const o of offsets) {
    const pair = `${o.sensor_i}-${o.sensor_j}`;
    let idx = healthData.datasets.findIndex(ds => ds.label === pair);
    if (idx === -1) {
      idx = healthData.datasets.length;
      const backfill = new Array(healthData.labels.length - 1).fill(null);
      healthData.datasets.push({
        label: pair,
        data: backfill,
        borderWidth: 1.5,
        pointRadius: 0,
        borderColor: `hsl(${(idx * 67) % 360},70%,60%)`,
        backgroundColor: "transparent",
      });
    }
    healthData.datasets[idx].data.push(
      o.offset_ns
    );
    if (healthData.datasets[idx].data.length > maxPoints) {
      healthData.datasets[idx].data.shift();
    }
  }

  healthChart.update();

  // Refresh popup idle strip if aircraft selected
  if (selectedIcao) refreshPopupIdleStrip();
}

// ─── Aircraft click popup ─────────────────────────────────────────────────────
function openPopup(icao24) {
  selectedIcao = icao24;
  refreshPopup();
  document.getElementById("ac-popup").style.display = "block";
  drawAttributionLines(icao24);
  flushTrailSource(icao24);
}

function refreshPopup() {
  if (!selectedIcao || !aircraft[selectedIcao]) return;
  const ac = aircraft[selectedIcao];
  const s = ac.state;
  const age = Date.now() - ac.lastSeen;
  const isAdsb = s.gdop === 0;
  const srcBadge = isAdsb
    ? `<span class="badge" style="background:#1d4ed8;color:#fff">ADS-B</span>`
    : `<span class="badge" style="background:#6b21a8;color:#fff">MLAT</span>`;
  document.getElementById("popup-icao").innerHTML = `${s.icao24.toUpperCase()} ${srcBadge}`;

  const speedKts = Math.sqrt((s.vel_lat || 0) ** 2 + (s.vel_lon || 0) ** 2) * 111000 * 1.944;
  const headingDeg = ((Math.atan2(s.vel_lon || 0, s.vel_lat || 0) * 180 / Math.PI) + 360) % 360;
  const trail = ac.trail || [];
  const trailStart = trail.length > 0 ? trail[0].ts : Date.now();
  const durationMs = Date.now() - trailStart;
  const durationStr = durationMs < 60000
    ? `${Math.round(durationMs / 1000)}s`
    : `${Math.floor(durationMs / 60000)}m ${Math.round((durationMs % 60000) / 1000)}s`;
  const rows = [
    ["Alt", `${Math.round(s.alt_m)}m / ${Math.round(s.alt_m * 3.281)}ft`],
    ["Speed", `${speedKts.toFixed(0)} kts`],
    ["Heading", `${headingDeg.toFixed(0)}\u00b0`],
    ["GDOP", s.gdop > 0 ? s.gdop.toFixed(2) : "N/A (ADS-B)"],
    ["Accuracy", `\u00b1${Math.round(s.confidence_ellipse_m)}m (2\u03c3)`],
    ["Sensors", s.sensor_count],
    ["Anomaly", `${s.anomaly_label} (${((s.anomaly_confidence || 0) * 100).toFixed(0)}%)`],
    ["Spoof", s.spoof_flag ? `Yes \u2014 ${Math.round(s.divergence_m)}m div` : "No"],
    ["DoF", s.dof],
    ["Last seen", `${((Date.now() - ac.lastSeen) / 1000).toFixed(0)}s ago`],
    ["Tracked", durationStr],
    ["Trail pts", `${trail.length} / ${MAX_TRAIL_POINTS}`],
  ];
  document.getElementById("popup-table").innerHTML =
    rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");

  refreshPopupIdleStrip(age);
}

function refreshPopupIdleStrip(age) {
  age = age ?? (selectedIcao ? Date.now() - (aircraft[selectedIcao]?.lastSeen ?? Date.now()) : 0);
  const strip = document.getElementById("popup-idle");
  if (age > IDLE_WARNING_MS) {
    strip.style.display = "block";
    document.getElementById("popup-idle-time").textContent = `${Math.round(age / 1000)}s`;
  } else {
    strip.style.display = "none";
  }
}

function closePopup() {
  selectedIcao = null;
  document.getElementById("ac-popup").style.display = "none";
  clearAttributionLines();
  clearTrailSource();
}

map.on("click", closePopup);

// ─── Sensor attribution lines ─────────────────────────────────────────────────
function drawAttributionLines(icao24) {
  clearAttributionLines();
  const ac = aircraft[icao24];
  if (!ac || !ac.state.sensor_ids?.length || ac.state.gdop === 0) return;
  for (const sid of ac.state.sensor_ids) {
    const sd = sensorData[sid];
    if (!sd) continue;
    const line = L.polyline(
      [[sd.lat, sd.lon], [ac.state.lat, ac.state.lon]],
      { color: "#60a5fa", weight: 1.5, opacity: 0.7, dashArray: "5 4" }
    ).addTo(map);
    attributionLines.push(line);
    // Highlight sensor marker to yellow if visible
    if (sensorMarkers[sid]) {
      sensorMarkers[sid].getElement()?.querySelector("polygon")?.setAttribute("fill", "#facc15");
    }
  }
}

function clearAttributionLines() {
  for (const l of attributionLines) map.removeLayer(l);
  attributionLines = [];
  // Reset all sensor marker colors
  for (const m of Object.values(sensorMarkers)) {
    m.getElement()?.querySelector("polygon")?.setAttribute("fill", "#60a5fa");
  }
}

// ─── Topology visualization ──────────────────────────────────────────────────
function updateTopology(clockData) {
  // Clear existing topology
  topologyLayer.clearLayers();
  for (const k of Object.keys(sensorNodes)) delete sensorNodes[k];

  if (!clockData || !clockData.success) return;

  // Draw edges first (so they're behind nodes)
  if (clockData.edges) {
    for (const edge of clockData.edges) {
      const s_i = sensorData[edge.sensor_i];
      const s_j = sensorData[edge.sensor_j];
      if (!s_i || !s_j) continue;

      // Edge color by MAD: Green (<50ns), Yellow (50-100ns), Red (>100ns)
      let edgeColor = "#22c55e";
      if (edge.mad_ns > 100) edgeColor = "#ef4444";
      else if (edge.mad_ns > 50) edgeColor = "#f59e0b";

      // Opacity proportional to weight (normalized, clamped to 0.3-0.9)
      const opacity = Math.min(0.9, Math.max(0.3, edge.weight));

      // Width proportional to obs_count (log scale)
      const width = 1 + Math.log10(edge.obs_count + 1);

      const polyline = L.polyline(
        [[s_i.lat, s_i.lon], [s_j.lat, s_j.lon]],
        { color: edgeColor, opacity, weight: width }
      );

      polyline.bindTooltip(
        `Baseline: ${(edge.baseline_m / 1000).toFixed(1)} km<br>` +
        `Obs: ${edge.obs_count}<br>` +
        `MAD: ${edge.mad_ns.toFixed(1)} ns`,
        { permanent: false }
      );

      polyline.addTo(topologyLayer);
    }
  }

  // Draw sensor nodes
  if (clockData.sensors) {
    for (const sensor of clockData.sensors) {
      const sd = sensorData[sensor.sensor_id];
      if (!sd) continue;

      // Node color by status
      let nodeColor = "#6e7681"; // Disconnected
      if (sensor.status === "stable") nodeColor = "#22c55e";
      else if (sensor.status === "marginal") nodeColor = "#f59e0b";
      else if (sensor.status === "unstable") nodeColor = "#ef4444";

      // Radius proportional to uncertainty (capped)
      const radius = 10 + Math.min(50, sensor.uncertainty_ns / 50);

      const circle = L.circleMarker([sd.lat, sd.lon], {
        radius,
        fillColor: nodeColor,
        color: "#fff",
        weight: 2,
        fillOpacity: 0.6
      });

      // Tooltip with full stats
      const offsetStr = (sensor.offset_ns != null) ? sensor.offset_ns.toFixed(1) : "—";
      const driftStr = (sensor.drift_ns_per_s != null) ? sensor.drift_ns_per_s.toFixed(3) : "—";
      const uncertaintyStr = (sensor.uncertainty_ns != null) ? sensor.uncertainty_ns.toFixed(1) : "—";

      let tooltipHtml = `<b>Sensor ${sensor.sensor_id}</b><br>` +
        `Offset: ${offsetStr} ns<br>` +
        `Drift: ${driftStr} ns/s<br>` +
        `Uncertainty: ±${uncertaintyStr} ns<br>` +
        `Status: ${sensor.status ? sensor.status.toUpperCase() : 'UNKNOWN'}`;

      if (sensor.allan_deviation) {
        const ad = sensor.allan_deviation;

        // Null-safe formatting matching updateGdopHeatmap pattern
        const adev1sStr = (ad.adev_1s != null && Number.isFinite(ad.adev_1s))
          ? ad.adev_1s.toFixed(1)
          : "—";

        const adev60sStr = (ad.adev_60s != null && Number.isFinite(ad.adev_60s))
          ? ad.adev_60s.toFixed(1)
          : "—";

        const classStr = ad.oscillator_class
          ? ad.oscillator_class.replace(/_/g, ' ')
          : "Unknown";

        tooltipHtml += `<br><br><b>Allan Deviation:</b><br>` +
          `ADEV(1s): ${adev1sStr} ns<br>` +
          `ADEV(60s): ${adev60sStr} ns<br>` +
          `Class: ${classStr}`;
      }

      circle.bindTooltip(tooltipHtml, { permanent: false });
      circle.addTo(topologyLayer);
      sensorNodes[sensor.sensor_id] = circle;
    }
  }
}

function addStabilityAlert(level, message) {
  const timestamp = new Date().toLocaleTimeString();
  stabilityAlerts.unshift({ level, message, timestamp });
  if (stabilityAlerts.length > MAX_STABILITY_ALERTS) {
    stabilityAlerts.pop();
  }
  renderStabilityAlerts();
}

function renderStabilityAlerts() {
  const container = document.getElementById("stability-alert-list");
  const panel = document.getElementById("stability-alerts");

  if (stabilityAlerts.length === 0) {
    panel.style.display = "none";
    return;
  }

  panel.style.display = "block";
  container.innerHTML = stabilityAlerts.map(alert => {
    let icon = "";
    let className = "";
    if (alert.level === "critical") {
      icon = "⚠";
      className = "alert-critical";
    } else if (alert.level === "warning") {
      icon = "⚠";
      className = "alert-warning";
    } else {
      icon = "ℹ";
      className = "alert-info";
    }

    return `<div class="stability-alert-entry ${className}">
      <span class="alert-time">${alert.timestamp}</span>
      <span>${icon} ${alert.message}</span>
    </div>`;
  }).join("");
}

// Track previous sensor statuses for change detection
let prevSensorStatuses = {};

function processClockSyncGlobal(clockData) {
  // Update topology visualization
  updateTopology(clockData);

  // Detect sensor status changes and generate alerts
  if (clockData.sensors) {
    for (const sensor of clockData.sensors) {
      const prevStatus = prevSensorStatuses[sensor.sensor_id];
      const newStatus = sensor.status;

      if (prevStatus !== newStatus) {
        if (newStatus === "unstable") {
          const reason = sensor.allan_deviation && sensor.allan_deviation.adev_60s > 1000
            ? `σ=${sensor.uncertainty_ns.toFixed(0)}ns, ADEV(60s)=${sensor.allan_deviation.adev_60s.toFixed(0)}ns`
            : `σ=${sensor.uncertainty_ns.toFixed(0)}ns`;
          addStabilityAlert("critical", `Sensor ${sensor.sensor_id} → UNSTABLE (${reason})`);
        } else if (newStatus === "disconnected") {
          addStabilityAlert("critical", `Sensor ${sensor.sensor_id} → DISCONNECTED`);
        } else if (newStatus === "marginal" && prevStatus === "stable") {
          addStabilityAlert("warning", `Sensor ${sensor.sensor_id} → MARGINAL`);
        } else if (newStatus === "stable" && prevStatus && prevStatus !== "stable") {
          addStabilityAlert("info", `Sensor ${sensor.sensor_id} → STABLE`);
        }
      }

      prevSensorStatuses[sensor.sensor_id] = newStatus;
    }
  }

  // System-level health alert
  if (clockData.condition_number > 1e7) {
    addStabilityAlert("warning", `System ill-conditioned (κ=${clockData.condition_number.toExponential(1)})`);
  }

  // Update chart with enhanced tooltips
  updateSensorHealthChart(clockData);
}

// ─── WebSocket ───────────────────────────────────────────────────────────────
const WS_URL = `ws://${location.hostname}:9001`;
let ws;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById("conn-dot").style.background = "#22c55e";
  };

  ws.onclose = () => {
    document.getElementById("conn-dot").style.background = "#8b949e";
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === "sensor_health") {
      updateSensorHealth(Array.isArray(msg.offsets) ? msg.offsets : [], msg.sensors);
    } else if (msg.type === "clock_sync_global") {
      // Phase 4: Process global clock sync with topology + analytics
      processClockSyncGlobal(msg);
    } else if (msg.type === "gdop_heatmap") {
      // GDOP airspace coverage heatmap
      console.log("WebSocket message: gdop_heatmap received");
      updateGdopHeatmap(msg);
    } else {
      // aircraft state update
      updateAircraft(msg);
      document.getElementById("stat-time").textContent = new Date().toLocaleTimeString();
    }
  };
}

connect();
