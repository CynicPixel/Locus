# docker-compose.live.yml — production overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.live.yml up -d
version: "3.9"

services:
  go-ingestor:
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "256m" }

  rust-backend:
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "512m" }
    command: ["locus-backend", "--ws-addr", "0.0.0.0:9002", "--ml-service-url", "http://ml-service:8080"]

  ml-service:
    deploy:
      resources:
        limits: { cpus: "1.0", memory: "1g" }

  frontend:
    deploy:
      resources:
        limits: { cpus: "0.2", memory: "64m" }
