# docker-compose.dev.yml — local development overlay (no Docker networking)
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# In dev mode every service binds to localhost so you can reach them directly.
# The Unix socket is on the host at /tmp/locus/ingestor.sock.
version: "3.9"

services:
  go-ingestor:
    volumes:
      - type: bind
        source: /tmp/locus
        target: /tmp/locus

  rust-backend:
    environment:
      ML_SERVICE_URL: "http://localhost:8079"
    ports:
      - "127.0.0.1:9002:9002"
    command: ["locus-backend", "--ws-addr", "0.0.0.0:9002", "--ml-service-url", "http://ml-service:8080"]

  ml-service:
    ports:
      - "127.0.0.1:8079:8080"

  frontend:
    ports:
      - "127.0.0.1:3000:80"
